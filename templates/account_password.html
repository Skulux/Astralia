{% extends "base.html" %}
{% block content %}
<section class="page admin-login">
  <header class="page-header">
    <nav class="admin-tabs profile-management-tabs">
      <a class="admin-tab" href="{{ url_for('team_profile_verwaltung') }}">Profil</a>
      <a class="admin-tab active" href="{{ url_for('team_password_verwaltung') }}">Profil Verwaltung</a>
    </nav>
    <h1>Passwort ändern</h1>
    <p class="muted">Ändere hier dein eigenes Passwort.</p>
  </header>
  <form class="admin-card" method="post">
    <label>
      <span>Aktuelles Passwort</span>
      <input type="password" name="current_password" required>
    </label>
    <label>
      <span>Neues Passwort</span>
      <input type="password" name="new_password" minlength="8" required>
    </label>
    <label>
      <span>Neues Passwort wiederholen</span>
      <input type="password" name="confirm_password" minlength="8" required>
    </label>
    <button class="button" type="submit">Passwort speichern</button>
      <p class="muted small"><a href="{{ url_for('team_logout_verwaltung') }}">Logout</a></p>
  </form>
</section>
{% endblock %}
