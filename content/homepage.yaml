hero:
  logo: uploads/home-hero-logo-6ecd4fcf6be144829b796a542dfed326.png
  subtitle: "**Lumynaria** ist ein deutschsprachiger VTuber-Hub und Zuhause für viele\
    \ VTuber.\r\nHier treffen VTuberinnen aus ganz Deutschland aufeinander, um Ideen\
    \ zu teilen, Projekte umzusetzen und gemeinsam zu wachsen.  \r\nWir fördern Kreativität,\
    \ Gemeinschaft und Authentizität, ganz ohne Verträge oder Einschränkungen.\r\n\
    Bei Lumynaria kannst du ganz du selbst sein und deine Träume verwirklichen."
  kicker: Lumynaria ist der Ort, an dem Sterne entstehen und Träume Form annehmen.
