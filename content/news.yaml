  body: Vom 01.12 - 21.12 findet unser Weihnachts Event statt, dieses Jahr wird es
    besonders da wir dieses Jahr das erste mal für eine Charity Organisation sammeln.
  blocks:
  - type: text
    heading: ''
    body: 'In der Advents- und Weihnachtszeit möchten wir mit Wish Upon a Star etwas
      Gutes tun. Für viele von uns ist diese Zeit voller Licht, Wärme und kleiner
      Wunder. Gleichzeitig gibt es Tiere, deren Alltag von Not, Krankheit und Gefahr
      geprägt ist genau für sie sammeln wir in diesem Dezember!


      Wir sammeln für Notpfote Animal Rescue e.V.!


      Notpfote Animal Rescue e.V. ist ein gemeinnütziger Tierschutzverein mit Sitz
      in Düsseldorf, der sich für Tiere in Not einsetzt in Deutschland und international.
      Sie retten herrenlose Tiere, kümmern sich um medizinische Versorgung, vermitteln
      Tiere in liebevolle Zuhause und setzen sich durch Aufklärungsarbeit für besseren
      Tierschutz ein.


      Jede Spende zählt: Sie hilft, Leben zu retten, Unterkünfte zu sichern und Tieren
      eine zweite Chance zu geben.


      [Spenden-Link](https://www.betterplace.org/de/fundraising-events/55125)'
