- slug: the-gilded-dawn
  title: The Gilded Dawn
  summary: 'Ein strahlendes neues Zeitalter erwacht: über 155 einzigartige Völker,
    lebendige Magie und verborgene Bedrohungen.'
  blurb: 'Ein strahlendes neues Zeitalter erwacht: über 155 einzigartige Völker, lebendige
    Magie und verborgene Bedrohungen.'
  image: uploads/project-1-7aa7a2539cdf4b14bc4c15d173436e36.png
  url: '#'
  tags:
  - Minecraft
  - Roleplay
  - Modded
  blocks:
  - type: text
    heading: ''
    body: 'In der Renaissance eines neuen goldenen Zeitalters erwacht ein Reich, das
      vor Vielfalt förmlich pulsiert. Zwischen kunstvollen Städten und geheimnisvollen
      Wäldern leben mehr als 155 verschiedene Arten und Spezies: Feen und Elfen, Geister
      und Tierwesen, Gestaltwanderer, uralte Naturgeister und viele weitere, deren
      Namen nur in den ältesten Chroniken stehen.


      Während Fürsten prächtige Feste feiern und Künstler das Licht des neuen Morgens
      preisen, rumort in den verborgenen Winkeln der Welt eine Macht, die längst in
      Vergessenheit geraten war. Der Frieden der Völker ist zerbrechlich und jede
      Entscheidung kann das Schicksal des goldenen Zeitalters verändern.


      In The Gilded Dawn betrittst du eine Welt voller Magie, Geheimnisse und unendlicher
      Vielfalt. Welchem Pfad wirst du folgen, wenn das Licht neu erstrahlt?'
