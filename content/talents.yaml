      url: https://www.twitch.tv/fairyprincessvt
      icon: twitch.svg
    introduction: "Ich bin Fairy. Außerhalb des Feenlands dürfen wir unseren Namen\
      \ nicht verraten, deswegen bin ich überall nur als Fairy bekannt, manche nennen\
      \ mich aber auch einfach nur Fee.\r\nEines Tages musste ich leider aus dem Feenland\
      \ flüchten, weil es angegriffen wurde und so suchte ich Schutz in der Welt der\
      \ Menschen. Allerdings wusste ich nicht, dass ich dadurch all meine Feen Fähigkeiten\
      \ aufgeben würde und ich mich nicht mehr in meine normale Feen Form verwandeln\
      \ konnte.\r\n\r\nNun lebe ich ich einer menschlichen Gestalt in der Welt der\
      \ Menschen und arbeite in einem kleinen alten Blumenladen, lasse dort ab und\
      \ zu ein paar der schönsten Blumen erblühen und habe nebenbei das \"Streaming\"\
      \ für mich entdeckt.\r\nSeit jenem Tag, habe ich angefangen unterschiedliche\
      \ Spiele auf dieser lilanen Plattform zu streamen und habe mir einen Recht großen\
      \ Freundeskreis aufgebaut.\r\nVielleicht finde ich mit Hilfe dieser Freunde\
      \ irgendwann einen Weg, wieder nach Hause zu gehen."
